<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Quản lý sinh viên - Bài 1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Quản lý sinh viên</h1>
    <div class="controls">
      <button id="open-add">Thêm sinh viên</button>
    </div>
  </header>
  <section class="stats">
    <div>Tổng sinh viên: <span id="total">0</span></div>
    <div>Điểm trung bình lớp: <span id="avg">0</span></div>
  </section>
  <section>
    <table>
      <thead>
        <tr><th>MSSV</th><th>Họ tên</th><th>Ngày sinh</th><th>Lớp</th><th>ĐTB</th><th>Email</th><th>Thao tác</th></tr>
      </thead>
      <tbody id="student-tbody"></tbody>
    </table>
  </section>

  <div id="student-modal" class="modal hidden">
    <div class="modal-content">
      <h2 id="modal-title">Thêm sinh viên</h2>
      <form id="student-form">
        <div class="form-row">
          <label for="msv">MSSV</label>
          <input id="msv" required>
        </div>
        <div class="form-row">
          <label for="name">Họ và tên</label>
          <input id="name" required>
        </div>
        <div class="form-row">
          <label for="dob">Ngày sinh</label>
          <input id="dob" type="date" required>
        </div>
        <div class="form-row">
          <label for="className">Lớp</label>
          <input id="className" required>
        </div>
        <div class="form-row">
          <label for="avgGrade">Điểm trung bình</label>
          <input id="avgGrade" type="number" step="0.01" min="0" max="10" required>
        </div>
        <div class="form-row">
          <label for="email">Email</label>
          <input id="email" type="email" required>
        </div>
        <div class="form-actions">
          <button type="submit" id="save">Lưu</button>
          <button type="button" id="cancel">Hủy</button>
        </div>
      </form>
    </div>
  </div>

  <div id="message" class="message hidden"></div>

  <script src="app.js"></script>
</body>
</html>
